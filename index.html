<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mythic Mastery — Midnight Season 1</title>
    <meta name="description" content="Tips and strategies for World of Warcraft Mythic+ Season 1 dungeons in Midnight." />
    <meta name="author" content="Mythic Mastery" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <meta property="og:title" content="Mythic Mastery" />
    <meta property="og:description" content="Tips and strategies for WoW Mythic+ Season 1 dungeons." />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function() {
        var search = location.search;
        if (search) {
          var p = new URLSearchParams(search);
          var path = p.get('p');
          if (path) {
            var query = p.get('q');
            history.replaceState(null, null,
              location.pathname.split('/').slice(0, 2).join('/') +
              path + (query ? '?' + query.replace(/~and~/g, '&') : '') +
              location.hash
            );
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
